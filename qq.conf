// ==UserScript==
// @ScriptName        荔枝音频解锁
// @Author            baby
// @Function          解锁荔枝App付费内容试听限制，尝试绕过播放鉴权
// @UpdateTime        2026-04-21
// @Attention         自用脚本，仅供交流学习
// @Version           V1.0.0
// @ScriptURL         https://raw.githubusercontent.com/bxy0128/my_bed/master/lizhi2.conf
// ==/UserScript==

# > 荔枝音频鉴权解锁 (精准匹配 op 接口)
# > 对应 JS 地址请确保为你的 GitHub Raw 链接
# ^https?:\/\/httpproxy101\.lizhifm\.com\/op\/ url script-response-body https://raw.githubusercontent.com/bxy0128/my_bed/master/lizhi.js
# > 荔枝音频鉴权解锁 - 专项处理 5763 报警接口
^https?:\/\/.*\.lizhifm\.com\/op\/5763 url script-response-body https://raw.githubusercontent.com/bxy0128/my_bed/master/lizhi.js
# > 增加对余额接口的拦截 (假设接口是 5555，请根据抓包实际修改)
^https?:\/\/.*\.lizhifm\.com\/op\/(5763|5555) url script-response-body https://raw.githubusercontent.com/bxy0128/my_bed/master/lizhi.js
# 1. 强制将试听版链接替换为完整高清版 (正则匹配：将 _sd.m4a 替换为 _hd.mp3)
^https?:\/\/cdn.*\.gzlzfm\.com\/audio\/(.*)_sd\.m4a url 302 $1_hd.mp3

# 2. 如果还有那种带 audition 参数的链接，直接抹除参数
^https?:\/\/.*\.lizhifm\.com\/.*audition=\d+ url 302 audition=0
[MITM]
hostname = httpproxy101.lizhifm.com
